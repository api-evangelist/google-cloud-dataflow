aid: google-cloud-dataflow
name: Google Cloud Dataflow
description: >-
  Google Cloud Dataflow is a fully managed service for executing Apache Beam
  pipelines for batch and streaming data processing. It provides a serverless,
  fast, and cost-effective way to process data at scale.
image: https://cloud.google.com/images/social-icon-google-cloud-1200-630.png
tags:
- Data Processing
- Stream Processing
- Batch Processing
- ETL
- Apache Beam
- Big Data
